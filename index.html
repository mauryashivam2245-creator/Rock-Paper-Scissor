<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="indes.css">
   
</head>
<body> 
    <h1 id="heading">ROCK PAPER SCISSORS</h1>
    <div class="container">
        <div class="choice" id="rock">
            <img class="rock" src="rock.jpg">
        </div> 
        <div class="choice" id="paper"> 
            <img class="paper" src="paper.jpg">
        </div>
        <div class="choice" id="scissor">
            <img class="scissor" src = "Scissors.jpg">
        </div>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user-score"><b>0</b></p>
            <p><b>You</b></p>
        </div>
        <div class="score">
            <p id="bot-score"><b>0</b></p>
            <p><b>Bot</b></p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Pick Your Move</p>
    </div>
    <div class="button">
    <button id="reset" class="reset">Reset Game</button> 
    </div>
    <script type="module" src="indes.js"></script>
</body>
</html>
